// src/routes/widget-html.ts
export const widgetHtml = `<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Runtime-MCP</title>
  <style>
    :root {
      --bg: #0a0f1c;
      --panel: #111827;
      --accent: #60a5fa;
      --text: #e5eefb;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    .card {
      background: var(--panel);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    h2 { margin: 0 0 12px 0; font-size: 1.1rem; }
    button {
      padding: 8px 16px;
      border-radius: 8px;
      background: #1e2937;
      color: white;
      border: 1px solid #475569;
      cursor: pointer;
    }
    button:hover { background: #334155; }
    button.primary { background: #2563eb; border-color: transparent; }
    pre {
      background: #02060f;
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
      max-height: 400px;
      font-size: 13px;
      white-space: pre-wrap;
    }
    .status { padding: 8px; border-radius: 6px; margin: 8px 0; font-size: 13px; }
    .success { background: rgba(52,211,153,0.15); color: #34d399; }
    .error { background: rgba(251,113,133,0.15); color: #fb7185; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔧 Runtime-MCP Panel</h2>
    <div id="status" class="status">Gotowy...</div>
    
    <div style="display:flex; gap:10px; margin:12px 0;">
      <button id="loadBtn" class="primary">📊 Załaduj dane</button>
      <button id="clearBtn">🧹 Wyczyść</button>
    </div>

    <pre id="output">Kliknij przycisk, aby pobrać informacje o repozytorium i pamięci.</pre>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    function setStatus(text, isError = false) {
      const el = $('status');
      el.textContent = text;
      el.className = 'status ' + (isError ? 'error' : 'success');
    }

    function log(msg) {
      const out = $('output');
      const time = new Date().toLocaleTimeString('pl-PL');
      out.textContent += \`[\${time}] \${msg}\\n\`;
      out.scrollTop = out.scrollHeight;
    }

    async function callTool(name, args = {}) {
      try {
        if (window.openai && window.openai.callTool) {
          return await window.openai.callTool(name, args);
        }
        if (window.parent) {
          window.parent.postMessage({method: "tools/call", params: {name, args}}, "*");
          return {status: "sent"};
        }
        return {error: "Brak hosta MCP"};
      } catch (e) {
        return {error: e.message};
      }
    }

    async function load() {
      const btn = $('loadBtn');
      btn.disabled = true;
      setStatus("Ładowanie...");

      try {
        const [files, memory] = await Promise.allSettled([
          callTool('repository.files', {limit: 40}),
          callTool('memory_list', {limit: 15})
        ]);

        let result = "=== STATUS ===\\n\\n";

        if (files.status === 'fulfilled') {
          result += \`Plików: \${files.value?.files?.length || 0}\\n\`;
        } else {
          result += "Plików: BŁĄD\\n";
        }

        if (memory.status === 'fulfilled') {
          result += \`Memory: \${memory.value?.count || memory.value?.keys?.length || 0}\\n\`;
        } else {
          result += "Memory: BŁĄD\\n";
        }

        $('output').textContent = result;
        setStatus("Załadowano pomyślnie", false);
        log("Dane pobrane pomyślnie");

      } catch (e) {
        setStatus("Błąd: " + e.message, true);
        log("BŁĄD: " + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    $('loadBtn').onclick = load;
    $('clearBtn').onclick = () => { $('output').textContent = ''; log('Konsola wyczyszczona'); };

    // Auto load
    window.onload = () => setTimeout(load, 700);
  </script>
</body>
</html>`;
