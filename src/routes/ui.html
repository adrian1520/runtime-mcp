// src/routes/widget-html.ts

export const widgetHtml = `<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Runtime MCP</title>

<style>
:root{
    --bg:#0a0f1c;
    --panel:#111827;
    --border:#334155;
    --text:#e5eefb;
    --muted:#94a3b8;
    --primary:#2563eb;
    --success:#22c55e;
    --danger:#ef4444;
}

*{box-sizing:border-box}

body{
    margin:0;
    padding:16px;
    background:var(--bg);
    color:var(--text);
    font-family:system-ui,sans-serif;
}

.card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px;
}

button{
    padding:8px 14px;
    border-radius:8px;
    border:1px solid #475569;
    background:#1e2937;
    color:white;
    cursor:pointer;
}

button.primary{
    background:var(--primary);
    border:none;
}

button:disabled{
    opacity:.5;
}

.status{
    margin:12px 0;
    padding:8px;
    border-radius:6px;
}

.success{
    background:rgba(34,197,94,.15);
    color:var(--success);
}

.error{
    background:rgba(239,68,68,.15);
    color:var(--danger);
}

pre{
    background:#02060f;
    padding:12px;
    border-radius:8px;
    overflow:auto;
    white-space:pre-wrap;
    max-height:500px;
    font-size:13px;
}
</style>

</head>

<body>

<div class="card">

<h2>🔧 Runtime MCP Inspector</h2>

<div id="status" class="status">
Gotowy
</div>

<div style="display:flex;gap:10px;margin:12px 0">
<button id="refresh" class="primary">
Odśwież
</button>

<button id="clear">
Wyczyść
</button>
</div>

<pre id="output"></pre>

</div>

<script>

const $ = id => document.getElementById(id);

const logs=[];

function renderLogs(){
    $("output").textContent=logs.join("\\n");
}

function log(msg){

    logs.push(
        "["+
        new Date().toLocaleTimeString("pl-PL")+
        "] "+
        msg
    );

    renderLogs();
}

function setStatus(text,error=false){

    const el=$("status");

    el.textContent=text;
    el.className="status "+(error?"error":"success");
}

async function callTool(name,args={}){

    if(!window.openai?.callTool){
        throw new Error(
            "window.openai.callTool() unavailable"
        );
    }

    const result=await window.openai.callTool(
        name,
        args
    );

    if(result?.error){

        throw new Error(
            result.error.message ??
            "Tool failed"
        );
    }

    return (
        result.result ??
        result.structuredContent ??
        result
    );
}

async function refresh(){

    $("refresh").disabled=true;

    setStatus("Ładowanie...");

    logs.length=0;

    try{

        const [
            repo,
            tools
        ]=await Promise.all([

            callTool(
                "repository.files",
                {}
            ),

            callTool(
                "tools/list",
                {}
            )

        ]);

        log("Połączono z Runtime MCP");

        log("");

        log("=== REPOSITORY ===");

        log(
            "Files: "+
            (repo.summary?.files ??
            repo.files?.length ??
            "?")
        );

        log(
            "Directories: "+
            (repo.summary?.directories ??
            "?")
        );

        log("");

        log("=== TOOLS ===");

        const list=
            tools.tools ??
            [];

        for(const tool of list){

            log("• "+tool.name);

        }

        log("");

        log(
            "Loaded "+
            list.length+
            " tools"
        );

        setStatus(
            "Połączono",
            false
        );

    }
    catch(err){

        console.error(err);

        setStatus(
            err.message,
            true
        );

        log(
            "ERROR: "+
            err.message
        );

    }
    finally{

        $("refresh").disabled=false;

    }

}

$("refresh").onclick=refresh;

$("clear").onclick=()=>{

    logs.length=0;

    renderLogs();

};

window.onload=()=>{

    refresh();

};

</script>

</body>
</html>`;
