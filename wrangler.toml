name = "runtime-mcp"
main = "src/index.ts"
compatibility_date = "2026-05-24"

# Jeśli używasz nowych runtime-ów, możesz to zostawić:
# compatibility_flags = ["nodejs_compat"]

kv_namespaces = [
  { binding = "STATE_KV", id = "06b99591564d43cfa1c86b56184e22aa" }
]

[vars]
# NIE wpisuj tu API_KEY jeśli to produkcja.
# Ustaw API_KEY jako Secret w Cloudflare Dashboard: Settings → Variables → Secrets
# API_KEY = "..."

[observability]
enabled = true

[observability.logs]
enabled = true

[observability.traces]
enabled = true