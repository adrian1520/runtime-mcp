name: PDF Pages Export (30-40)

on:
  workflow_dispatch:
    inputs:
      pdf_file:
        description: "Path to PDF file"
        required: true
        default: "input.pdf"
        type: string

      output_format:
        description: "Output format"
        required: true
        type: choice
        options:
          - vector
          - high-dpi

      dpi:
        description: "Raster DPI"
        required: false
        default: "2400"
        type: string

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ghostscript \
            qpdf \
            poppler-utils

      - name: Verify tools
        run: |
          set -e

          gs --version
          qpdf --version
          pdfinfo -v

      - name: Verify input PDF
        run: |
          set -euo pipefail

          FILE="${{ inputs.pdf_file }}"

          if [ ! -f "$FILE" ]; then
            echo "ERROR: PDF not found."
            exit 1
          fi

          if ! file "$FILE" | grep -q PDF; then
            echo "ERROR: Invalid PDF."
            exit 1
          fi

          PAGES=$(pdfinfo "$FILE" | awk '/Pages:/ {print $2}')

          echo "Pages: $PAGES"

          if [ "$PAGES" -lt 40 ]; then
            echo "ERROR: PDF must contain at least 40 pages."
            exit 1
          fi

      - name: Create output directory
        run: mkdir -p output

      ###################################################################
      # VECTOR PDF
      ###################################################################

      - name: Export vector PDF
        if: ${{ inputs.output_format == 'vector' }}
        run: |
          set -euo pipefail

          qpdf \
            "${{ inputs.pdf_file }}" \
            --pages "${{ inputs.pdf_file }}" 30-40 -- \
            output/pages-30-40-vector.pdf

          ls -lh output

      ###################################################################
      # HIGH DPI PNG
      ###################################################################

      - name: Export high DPI PNG
        if: ${{ inputs.output_format == 'high-dpi' }}
        run: |
          set -euo pipefail

          mkdir -p output/high-dpi

          gs \
            -dSAFER \
            -dBATCH \
            -dNOPAUSE \
            -sDEVICE=pngalpha \
            -r${{ inputs.dpi }} \
            -dFirstPage=30 \
            -dLastPage=40 \
            -sOutputFile=output/high-dpi/page-%03d.png \
            "${{ inputs.pdf_file }}"

          ls -lh output/high-dpi

      ###################################################################
      # METADATA
      ###################################################################

      - name: Generate metadata
        run: |
          cat > output/metadata.json <<EOF
          {
            "source_file":"${{ inputs.pdf_file }}",
            "pages":"30-40",
            "format":"${{ inputs.output_format }}",
            "dpi":"${{ inputs.dpi }}",
            "generated":"$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

          cat output/metadata.json

      ###################################################################
      # UPLOAD
      ###################################################################

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdf-pages-30-40-${{ inputs.output_format }}
          path: output/
          retention-days: 30